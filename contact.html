<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | The Home Lab Guy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <nav id="navbar">
        <div class="nav-content">
            <div class="logo">HomeLab<span>Dev</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html" class="active btn-nav">Get a Quote</a></li>
            </ul>
        </div>
    </nav>

    <section class="contact page-padding">
        <div class="contact-container reveal">
            <div class="contact-info">
                <h2>Let's build something amazing.</h2>
                <p>We pride ourselves on offering the best work at the most competitive prices. Drop us a line.</p>
                
                <div class="contact-method">
                    <i class="fas fa-envelope interactive-icon"></i>
                    <div>
                        <h4>Direct Email</h4>
                        <a href="mailto:purchese@thehomelabguy.com" class="email-link">purchese@thehomelabguy.com</a>
                    </div>
                </div>
                
                <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=600&q=80" alt="Contact Us" class="contact-img floating-slow">
            </div>
            
            <div class="contact-form-container">
                <form class="contact-form glass-panel">
                    <h3>Send a Message</h3>
                    <div class="input-group">
                        <input type="text" placeholder="Your Name" required>
                    </div>
                    <div class="input-group">
                        <input type="email" placeholder="Your Email" required>
                    </div>
                    <div class="input-group">
                        <textarea placeholder="Tell us about your awesome project..." rows="5" required></textarea>
                    </div>
                    <button type="button" class="btn btn-primary hover-glow" onclick="alert('Email system ready to route to purchese@thehomelabguy.com!')">Launch Project <i class="fas fa-rocket"></i></button>
                </form>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
